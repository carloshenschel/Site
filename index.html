<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Thread</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    color:#333;
}

header{
    background:#111;
    color:white;
    text-align:center;
    padding:30px 20px;
}

header h1{
    font-size:2.5rem;
}

header p{
    margin-top:10px;
    color:#ccc;
}

.produtos{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
    padding:40px 20px;
}

.produto{
    background:white;
    width:280px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:transform 0.3s ease, box-shadow 0.3s ease;
}

.produto:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.produto img{
    width:100%;
    display:block;
}

.produto-info{
    padding:20px;
    text-align:center;
}

.produto h3{
    margin-bottom:10px;
}

.preco{
    font-size:1.3rem;
    font-weight:bold;
    color:#111;
    margin-bottom:15px;
}

button{
    background:#111;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    transition:background 0.3s;
}

button:hover{
    background:#444;
}

footer{
    text-align:center;
    padding:20px;
    background:#111;
    color:white;
    margin-top:30px;
}

@media(max-width:600px){
    header h1{
        font-size:2rem;
    }

    .produto{
        width:100%;
        max-width:320px;
    }
}
</style>

</head>
<body>

<header>
    <h1>Pure Thread</h1>
    <p>Moda minimalista e moderna</p>
</header>

<section class="produtos">

    <div class="produto">
        <img src="https://via.placeholder.com/280x350" alt="Camiseta">
        <div class="produto-info">
            <h3>Camiseta Essential</h3>
            <p class="preco">R$ 49,90</p>
            <button>Comprar</button>
        </div>
    </div>

    <div class="produto">
        <img src="https://via.placeholder.com/280x350" alt="Calça">
        <div class="produto-info">
            <h3>Calça Casual</h3>
            <p class="preco">R$ 89,90</p>
            <button>Comprar</button>
        </div>
    </div>

    <div class="produto">
        <img src="https://via.placeholder.com/280x350" alt="Moletom">
        <div class="produto-info">
            <h3>Moletom Premium</h3>
            <p class="preco">R$ 129,90</p>
            <button>Comprar</button>
        </div>
    </div>

</section>

<footer>
    © 2026 Pure Thread - Todos os direitos reservados.
</footer>

</body>
</html>
